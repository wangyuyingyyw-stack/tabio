<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎使用 Tabio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 50px;
      max-width: 680px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: 32px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    .header p {
      color: #666;
      font-size: 16px;
    }
    .features {
      display: flex;
      flex-direction: column;
      gap: 28px;
      margin-bottom: 40px;
    }
    .feature {
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }
    .feature-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .feature:nth-child(1) .feature-icon { background: #e8f4fd; }
    .feature:nth-child(2) .feature-icon { background: #fef3e2; }
    .feature:nth-child(3) .feature-icon { background: #e8f8e8; }
    .feature-content h3 {
      font-size: 16px;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .feature-content p {
      font-size: 14px;
      color: #666;
      line-height: 1.5;
    }
    .shortcut-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .key-inline {
      background: #f0edff;
      border: 1px solid #d4cdf7;
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: monospace;
      color: #5b4dc7;
    }
    .arrow-inline {
      font-size: 14px;
      color: #bbb;
    }
    .footer {
      text-align: center;
    }
    .footer p {
      font-size: 13px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>✨ 欢迎使用 Tabio</h1>
      <p>你的智能标签页管理助手，已经开始工作了</p>
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">🔄</div>
        <div class="feature-content">
          <h3>自动去重</h3>
          <p>重复打开的页面会自动合并，保留最新的那个。</p>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">⏰</div>
        <div class="feature-content">
          <h3>自动清理</h3>
          <p>长时间没看的标签自动关闭，随时可在历史中恢复。</p>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔍</div>
        <div class="feature-content">
          <h3>快捷搜索已打开网页</h3>
          <p>找不到某个网页？在地址栏输入 <strong>go</strong>，按一下<strong>空格键</strong>，然后输入关键词，即可跨窗口搜索已打开的网页并跳转。</p>
          <div class="shortcut-inline">
            <span class="key-inline">go</span>
            <span class="arrow-inline">→</span>
            <span class="key-inline">空格</span>
            <span class="arrow-inline">→</span>
            <span class="key-inline">输入关键词搜索</span>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>点击工具栏 Tabio 图标查看概览和设置</p>
    </div>
  </div>
</body>
</html>
